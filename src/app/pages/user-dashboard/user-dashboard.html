<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-5">
  <div class="container-fluid max-w-custom justify-content-end">

    <div class="d-flex align-items-center gap-3">
      <a
        class="btn btn-outline-light px-4 rounded-pill fw-medium"
        routerLink="/results">
        View Results
      </a>

      <button
        class="btn btn-outline-light px-4 rounded-pill fw-medium"
        (click)="logout()">
        Logout
      </button>
    </div>

  </div>
</nav>

<div class="container max-w-custom">
  <div
    *ngIf="message"
    class="alert alert-info rounded-3 text-center mb-4 border-0 shadow-sm">
    {{ message }}
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8">

      <!-- When poll is closed -->
      <div class="card premium-card text-center p-5" *ngIf="!pollOpen">
        <h3 class="fw-bold mb-2">Voting is Closed</h3>
        <p class="text-muted fs-5 fw-medium mb-0">
          Please wait for the admin to officially open the poll.
        </p>
      </div>

      <!-- When poll is open -->
      <div class="card premium-card" *ngIf="pollOpen">
        <div class="card-header text-center border-0 pt-4 pb-0">
          <h4 class="fw-bold mb-1">Vote for your Team</h4>
          <p class="text-muted small">Select the team you want to win</p>
        </div>

        <div class="card-body p-4 p-sm-5">
          <div class="list-group list-group-flush gap-3">
            <div
              class="list-group-item d-flex justify-content-between align-items-center border rounded-3 p-3 shadow-sm bg-white"
              *ngFor="let team of teams | slice:(page-1)*pageSize:page*pageSize">

              <span class="fw-semibold text-dark fs-5">
                {{ team.teamName }}
              </span>

              <button
                class="btn btn-success px-4 rounded-pill fw-medium"
                (click)="vote(team.id)">
                Vote Now
              </button>
            </div>

            <div
              class="text-center text-muted py-5 bg-light rounded-3 border"
              *ngIf="teams.length === 0">
              <p class="mb-0 fw-medium">
                No teams available for voting yet.
              </p>
            </div>
          </div>

          <div
            class="d-flex justify-content-between align-items-center mt-4"
            *ngIf="teams.length > pageSize">

            <button
              class="btn btn-outline-secondary rounded-pill px-3 btn-sm fw-medium"
              (click)="prevPage()"
              [disabled]="page === 1">
              Previous
            </button>

            <span class="text-muted fw-medium small">
              Page {{ page }} of {{ totalPages }}
            </span>

            <button
              class="btn btn-outline-secondary rounded-pill px-3 btn-sm fw-medium"
              (click)="nextPage()"
              [disabled]="page === totalPages">
              Next
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
