<nav class="navbar navbar-dark bg-primary mb-4">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">User Dashboard</span>
    <div>
        <a class="btn btn-outline-light me-2" routerLink="/results">View Results</a>
        <button class="btn btn-light" (click)="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container">
  <div *ngIf="message" class="alert alert-info">{{ message }}</div>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4>Vote for your Team</h4>
        </div>
        <ul class="list-group list-group-flush">
          <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let team of teams">
            {{ team.teamName }}
            <button class="btn btn-success btn-sm" (click)="vote(team.id)">Vote</button>
          </li>
          <li class="list-group-item" *ngIf="teams.length === 0">No teams available for voting.</li>
        </ul>
      </div>
    </div>
  </div>
</div>
