<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">Poll Results</span>
    <a class="btn btn-outline-light" routerLink="/user-dashboard">Back to Dashboard</a>
  </div>
</nav>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div *ngIf="message" class="alert alert-warning text-center">
        <h4>{{ message }}</h4>
      </div>

      <div class="card shadow-sm border-warning" *ngIf="!message && results.length > 0">
        <div class="card-header bg-warning text-dark text-center">
          <h3>Current Rankings</h3>
        </div>
        <ul class="list-group list-group-flush">
          <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let res of results; let i = index">
            <span><strong>#{{ i + 1 }}</strong> {{ res.teamName }}</span>
            <span class="badge bg-primary rounded-pill" style="font-size: 1.1em;">{{ res.totalVotes }} Votes</span>
          </li>
        </ul>
      </div>
      
      <div class="alert alert-info text-center" *ngIf="!message && results.length === 0">
         No votes have been cast yet.
      </div>
    </div>
  </div>
</div>
